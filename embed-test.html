<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Digital Labs — Embed Widget Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #e0e0e0; }

    .header { padding: 24px 32px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 1.4rem; font-weight: 600; color: #0009DC; }
    .header span { font-size: 0.85rem; color: #888; }
    .header .badge { background: #dc3545; color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }

    .controls { padding: 16px 32px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #222; }
    .control-group { display: flex; align-items: center; gap: 6px; }
    .controls label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.03em; }
    .controls select, .controls input { background: #1a1a1a; border: 1px solid #333; color: #e0e0e0; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; }
    .controls button { background: #0009dc; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .controls button:hover { background: #0007b0; }
    .controls button.secondary { background: #333; }
    .controls button.secondary:hover { background: #444; }
    .env-indicator { padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .env-indicator.prod { background: #dc354522; color: #f87171; }
    .env-indicator.staging { background: #22c55e22; color: #4ade80; }

    .grid { padding: 24px 32px; display: grid; gap: 24px; }
    .grid.single { grid-template-columns: 1fr; }
    .grid.dual { grid-template-columns: 1fr 1fr; }
    .grid.triple { grid-template-columns: 1fr 1fr 1fr; }

    .embed-card { border: 1px solid #333; border-radius: 12px; overflow: hidden; background: #111; }
    .embed-card__header { padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .embed-card__title { font-size: 0.85rem; font-weight: 600; }
    .embed-card__app { font-size: 0.75rem; color: #888; margin-left: 6px; }
    .embed-card__meta { display: flex; align-items: center; gap: 8px; }
    .embed-card__status { font-size: 0.7rem; padding: 2px 8px; border-radius: 8px; }
    .embed-card__status--active { background: #1a3a1a; color: #4ade80; }
    .embed-card__status--loading { background: #3a3a1a; color: #facc15; }
    .embed-card__status--error { background: #3a1a1a; color: #f87171; }
    .embed-card__url { font-size: 0.65rem; color: #555; padding: 4px 16px; background: #0a0a0a; font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .embed-card iframe { width: 100%; height: 600px; border: none; }

    .test-results { padding: 16px 32px; border-top: 1px solid #222; }
    .test-results h3 { font-size: 0.9rem; color: #999; margin-bottom: 8px; }
    .test-log { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; }
    .test-log .pass { color: #4ade80; }
    .test-log .fail { color: #f87171; }
    .test-log .info { color: #888; }

    @media (max-width: 1200px) { .grid.triple { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 800px) { .grid.dual, .grid.triple { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="header">
    <h1>AI Digital Labs</h1>
    <span>Embed Widget Test</span>
    <span class="badge">ADMIN ONLY</span>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Environment:</label>
      <select id="env" onchange="updateEnv()">
        <option value="production">Production</option>
        <option value="staging">Staging</option>
      </select>
      <span class="env-indicator prod" id="env-badge">PRODUCTION</span>
    </div>

    <div class="control-group">
      <label>Layout:</label>
      <select id="layout" onchange="updateLayout()">
        <option value="single">Single</option>
        <option value="dual" selected>Side by Side</option>
        <option value="triple">Triple</option>
      </select>
    </div>

    <div class="control-group">
      <label>Height:</label>
      <select id="height" onchange="updateHeight()">
        <option value="400">400px</option>
        <option value="600" selected>600px</option>
        <option value="800">800px</option>
        <option value="100vh">Full Height</option>
      </select>
    </div>

    <div class="control-group">
      <label>Theme:</label>
      <select id="theme">
        <option value="">Default (AI Labs)</option>
        <option value="ai-digital">AI Digital</option>
      </select>
    </div>

    <button onclick="reloadAll()">Reload All</button>
    <button class="secondary" onclick="runChecks()">Run Checks</button>
  </div>

  <div class="grid dual" id="grid"></div>

  <div class="test-results" id="test-section" style="display:none;">
    <h3>Embed Health Checks</h3>
    <div class="test-log" id="test-log"></div>
  </div>

  <script>
    const PROD_URLS = {
      neuromarketing: 'https://neuromarketing-audit.apps.aidigitallabs.com',
      'website-audit': 'https://website-audit.apps.aidigitallabs.com',
      'prompt-engineering': 'https://prompt-engineer.apps.aidigitallabs.com',
      'aio-optimization': 'https://aio-optimization.apps.aidigitallabs.com',
      'synthetic-focus-group': 'https://synthetic-focus-group.apps.aidigitallabs.com',
    };

    const STAGING_URLS = {
      neuromarketing: 'https://develop--aidigitallabs-neuromarketing-audit.netlify.app',
      'website-audit': 'https://develop--aidigitallabs-website-audit.netlify.app',
      'prompt-engineering': 'https://develop--ai-labs-prompt-engineering.netlify.app',
      'aio-optimization': 'https://develop--aio-optimization.netlify.app',
      'synthetic-focus-group': 'https://develop--aidigitallabs-synthetic-focus-group.netlify.app',
    };

    // Production embed tokens (from embed_tokens table)
    const TOKENS = {
      neuromarketing: 'ecd86136f74139eb049192997561e1994a6535fd53c0875ae23870de33c29f41',
      'website-audit': 'db9c89baf10403a63e5ce2ad9615c6378ffe4829a7f3651205bfb8f0f97fe5f7',
      'prompt-engineering': 'a118735d037742d47e2b48cd5f5ac95b192cf5ca6deb9161f7e1a4da28ecec62',
      'aio-optimization': '07bc4e3b803f19c93ae670b05045e8d256552c9f152b06c486c4ada72ec231bc',
      'synthetic-focus-group': 'e5b4b25f395f013c083e91dcb1160bc31094216420bb67e58f55929f0d434f35',
    };

    const APPS = [
      { name: 'Neuromarketing Audit', abbrev: 'NM', slug: 'neuromarketing' },
      { name: 'Website Audit', abbrev: 'WA', slug: 'website-audit' },
      { name: 'Prompt Engineering', abbrev: 'PE', slug: 'prompt-engineering' },
      { name: 'AIO Optimization', abbrev: 'AIO', slug: 'aio-optimization' },
      { name: 'Synthetic Focus Group', abbrev: 'SFG', slug: 'synthetic-focus-group' },
    ];

    function getEnv() { return document.getElementById('env').value; }
    function getTheme() { return document.getElementById('theme').value; }
    function getHeight() {
      const h = document.getElementById('height').value;
      return h === '100vh' ? 'calc(100vh - 200px)' : h + 'px';
    }

    function getBaseUrl(slug) {
      return getEnv() === 'staging' ? STAGING_URLS[slug] : PROD_URLS[slug];
    }

    function buildEmbedUrl(slug) {
      const theme = getTheme();
      let url = `${getBaseUrl(slug)}/embed?token=${TOKENS[slug]}`;
      if (theme) url += `&theme=${theme}`;
      return url;
    }

    function updateEnv() {
      const badge = document.getElementById('env-badge');
      if (getEnv() === 'staging') {
        badge.className = 'env-indicator staging';
        badge.textContent = 'STAGING';
      } else {
        badge.className = 'env-indicator prod';
        badge.textContent = 'PRODUCTION';
      }
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      APPS.forEach(app => {
        const embedUrl = buildEmbedUrl(app.slug);
        const card = document.createElement('div');
        card.className = 'embed-card';
        card.id = `card-${app.slug}`;
        card.innerHTML = `
          <div class="embed-card__header">
            <div>
              <span class="embed-card__title">${app.name}</span>
              <span class="embed-card__app">${app.abbrev}</span>
            </div>
            <div class="embed-card__meta">
              <span class="embed-card__status embed-card__status--loading" id="status-${app.slug}">Loading</span>
            </div>
          </div>
          <div class="embed-card__url" title="${embedUrl}">${embedUrl}</div>
          <iframe
            src="${embedUrl}"
            id="iframe-${app.slug}"
            style="height: ${getHeight()}"
            data-app="${app.slug}"
            onload="document.getElementById('status-${app.slug}').className='embed-card__status embed-card__status--active'; document.getElementById('status-${app.slug}').textContent='Active'"
            onerror="document.getElementById('status-${app.slug}').className='embed-card__status embed-card__status--error'; document.getElementById('status-${app.slug}').textContent='Error'"
          ></iframe>
        `;
        grid.appendChild(card);
      });
    }

    function updateLayout() {
      const grid = document.getElementById('grid');
      grid.className = `grid ${document.getElementById('layout').value}`;
    }

    function updateHeight() {
      const h = getHeight();
      document.querySelectorAll('.embed-card iframe').forEach(f => f.style.height = h);
    }

    function reloadAll() {
      APPS.forEach(app => {
        const iframe = document.getElementById(`iframe-${app.slug}`);
        const status = document.getElementById(`status-${app.slug}`);
        if (iframe) {
          status.className = 'embed-card__status embed-card__status--loading';
          status.textContent = 'Loading';
          iframe.src = buildEmbedUrl(app.slug);
        }
      });
    }

    function log(msg, cls = 'info') {
      const el = document.getElementById('test-log');
      el.innerHTML += `<div class="${cls}">${new Date().toLocaleTimeString()} — ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    async function runChecks() {
      document.getElementById('test-section').style.display = 'block';
      document.getElementById('test-log').innerHTML = '';
      log(`Running embed health checks on ${getEnv()}...`);

      let passed = 0, failed = 0;
      for (const app of APPS) {
        const url = buildEmbedUrl(app.slug);
        try {
          const res = await fetch(url, { mode: 'no-cors' });
          // no-cors won't give us status, but if it doesn't throw, the server is up
          const status = document.getElementById(`status-${app.slug}`);
          if (status && status.textContent === 'Active') {
            log(`✓ ${app.name} — iframe loaded successfully`, 'pass');
            passed++;
          } else {
            log(`? ${app.name} — server reachable but iframe status: ${status?.textContent}`, 'info');
            passed++;
          }
        } catch (err) {
          log(`✗ ${app.name} — ${err.message}`, 'fail');
          failed++;
        }
      }
      log(`Done: ${passed} passed, ${failed} failed`, passed === APPS.length ? 'pass' : 'fail');
    }

    renderGrid();
  </script>
</body>
</html>
